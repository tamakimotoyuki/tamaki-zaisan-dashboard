<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>たまき青空グループ 月次経営</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<!-- ログインゲート -->
<section id="page-login" class="page active">
  <div class="login-card">
    <img src="assets/logo.png" alt="logo" class="logo">
    <h1>たまき青空グループ<br>月次経営</h1>
    <form id="login-form" autocomplete="off">
      <label>ID
        <input type="text" id="login-id" autocomplete="off" autocapitalize="none" spellcheck="false" required>
      </label>
      <label>パスワード
        <input type="password" id="login-pw" autocomplete="off" required>
      </label>
      <button type="submit">ログイン</button>
      <p id="login-error" class="error"></p>
    </form>
  </div>
</section>

<!-- 法人選択 -->
<section id="page-houjin" class="page">
  <header class="topbar topbar-light">
    <span class="brand brand-light"><img src="assets/logo.png" alt=""> たまき青空グループ</span>
    <button id="logout" class="link-btn link-btn-light">ログアウト</button>
  </header>
  <main class="houjin-wrap">
    <h2>ご覧になる法人をお選びください</h2>
    <div class="houjin-grid">
      <button class="houjin-card" data-houjin="meiwakai">
        <span class="name">（医）明和会</span>
        <span class="sub">病院・クリニック・介護等 14施設</span>
      </button>
      <button class="houjin-card" data-houjin="mediens">
        <span class="name">（医）メディエンス</span>
        <span class="sub">ハート徳島クリニック</span>
      </button>
      <button class="houjin-card" data-houjin="ms">
        <span class="name">（有）たまきメディカルサポート</span>
        <span class="sub">本社・GH・派遣・阿波っ子等</span>
      </button>
      <button class="houjin-card" data-houjin="shafuku">
        <span class="name">（社福）明和福祉会</span>
        <span class="sub">特養・訪問ヘルパー・こども園</span>
      </button>
    </div>
  </main>
</section>

<!-- メインダッシュボード -->
<section id="page-dashboard" class="page">
  <header class="topbar">
    <button id="back-to-houjin" class="link-btn">← 法人選択</button>
    <span id="houjin-name" class="brand"></span>
    <button id="logout2" class="link-btn">ログアウト</button>
  </header>
  <nav class="tab-row" id="shisetsu-tabs"></nav>
  <nav class="tab-row sub" id="koumoku-tabs"></nav>
  <div class="chart-area">
    <div class="chart-toggle-wrap">
      <div class="chart-toggle">
        <label><input type="radio" name="mode" value="monthly" checked>単月</label>
        <label><input type="radio" name="mode" value="cumulative">累積</label>
      </div>
    </div>
    <div class="chart-canvas-wrap">
      <canvas id="main-chart"></canvas>
    </div>
  </div>
  <div class="table-area">
    <table id="main-table"></table>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
